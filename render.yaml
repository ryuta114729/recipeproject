databases:
  - name: mysitedb
    plan: free
    databaseName: recipedata
    user: oreryuta46
 
services:
  - type: web
    plan: free
    name: recipebook
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn recipeproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 4